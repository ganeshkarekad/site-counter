<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Tracker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <h1 class="popup-title">Site Tracker</h1>
      <button id="refreshBtn" class="refresh-btn" aria-label="Refresh data">
        <svg class="refresh-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/>
        </svg>
      </button>
    </header>
    
    <div class="filter-container">
      <button class="filter-btn active" data-period="today">Today</button>
      <button class="filter-btn" data-period="7days">7 Days</button>
      <button class="filter-btn" data-period="30days">30 Days</button>
      <button class="filter-btn" data-period="all">All Time</button>
    </div>
    
    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-value" id="totalSites">-</div>
        <div class="stat-label">Sites Visited</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalVisits">-</div>
        <div class="stat-label">Total Visits</div>
      </div>
    </div>
    
    <div class="chart-container">
      <h2 class="chart-title">Top Sites</h2>
      <canvas id="visitChart"></canvas>
    </div>
    
    <div class="top-sites-list" id="topSitesList"></div>
    
    <footer class="popup-footer">
      <div class="last-refresh">
        Last refresh: <span id="lastRefreshTime">Never</span>
      </div>
      <button id="clearDataBtn" class="clear-btn">Clear All Data</button>
    </footer>
  </div>
  
  <script src="chart.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
