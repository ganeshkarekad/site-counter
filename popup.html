<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foculatics: Site Counter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <h1 class="popup-title">Foculatics</h1>
      <button id="refreshBtn" class="refresh-btn" aria-label="Refresh data">
        <svg class="refresh-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/>
        </svg>
      </button>
    </header>
    
    <div class="filter-container">
      <button class="filter-btn active" data-period="today">Today</button>
      <button class="filter-btn" data-period="7days">7 Days</button>
      <button class="filter-btn" data-period="30days">30 Days</button>
      <button class="filter-btn" data-period="all">All Time</button>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="totalSites">-</div>
        <div class="stat-label">Sites Visited</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalVisits">-</div>
        <div class="stat-label">Total Visits</div>
      </div>
    </div>
    
    <div class="chart-container">
      <div class="chart-header">
        <h2 class="chart-title">Top Sites</h2>
        <div class="sort-container">
          <label for="sortSelect" class="sort-label">Sort by:</label>
          <select id="sortSelect" class="sort-select">
            <option value="visits">Most Visits</option>
            <option value="time">Time Spent</option>
            <option value="recent">Recent Visit</option>
          </select>
        </div>
      </div>
      <canvas id="visitChart"></canvas>
    </div>
    
    <div class="top-sites-list" id="topSitesList"></div>
    
    <div class="settings-section">
      <div class="settings-header">
        <h3 class="settings-title">Settings</h3>
        <button id="settingsToggle" class="settings-toggle" aria-label="Toggle settings">
          <svg class="settings-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v6m0 6v6m11-7h-6m-6 0H1m16.24-7.76l-4.24 4.24m-5.66 0L2.76 7.76m16.24 9.48l-4.24-4.24m-5.66 0L2.76 16.24"/>
          </svg>
        </button>
      </div>
      
      <div id="settingsContent" class="settings-content">
        <div class="setting-item">
          <div class="setting-info">
            <label class="setting-label" for="notificationToggle">Show Visit Notifications</label>
            <span class="setting-description">Display popup when visiting new sites</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="notificationToggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>
    
    <footer class="popup-footer">
      <div class="last-refresh">
        Last refresh: <span id="lastRefreshTime">Never</span>
      </div>
      <button id="clearDataBtn" class="clear-btn">Clear All Data</button>
    </footer>
  </div>
  
  <script src="chart.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
